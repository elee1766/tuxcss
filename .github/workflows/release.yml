name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: minify
        run: npx lightningcss-cli --minify tux.css -o tux.min.css

      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            tux.css \
            tux.min.css \
            --title "${{ github.ref_name }}" \
            --generate-notes
